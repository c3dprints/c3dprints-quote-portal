name: Keep Render awake

# Pings the backend's /health every ~10 minutes so Render's free service doesn't
# fall asleep (it sleeps after ~15 min idle), avoiding cold-start delays for
# customers. Remove/disable this after migrating off Render.
#
# Note: scheduled workflows only run from the DEFAULT branch (main), and GitHub
# may delay them under load. Retries below cover a cold boot if one does slip.

on:
  schedule:
    - cron: "*/10 * * * *"   # every 10 minutes
  workflow_dispatch: {}        # allow manual runs from the Actions tab

# If a run is somehow still going, don't pile up.
concurrency:
  group: keep-alive
  cancel-in-progress: false

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping /health (waking the service if it was asleep)
        run: |
          curl -sSf \
            --retry 5 --retry-delay 15 --retry-all-errors \
            --max-time 120 \
            https://c3dprints-quote-portal.onrender.com/health
