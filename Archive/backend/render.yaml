services:
  - type: web
    name: c3dprints-quote-portal
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: APP_ENV
        value: production
      - key: QUOTE_NOTIFY_EMAIL
        value: hi@c3dprints.com
